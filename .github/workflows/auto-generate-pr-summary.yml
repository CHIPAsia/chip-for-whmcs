name: Auto Generate PR Summary

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Get PR Diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Generate Summary with Ollama Cloud
        id: ollama
        env:
          OLLAMA_API_KEY: ${{ vars.OLLAMA_API_KEY || secrets.OLLAMA_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch existing PR body if it exists
          gh pr view ${{ github.event.pull_request.number }} --json body -q .body > current_body.md || touch current_body.md
          
          python scripts/generate_pr_summary.py pr_diff.txt current_body.md > summary.md
          # Set summary as output, but handle multiline output for GitHub Actions
          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          cat summary.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Update PR Description
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --body-file summary.md
